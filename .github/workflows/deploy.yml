name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # re-deploy when run reports are posted so reports.json stays fresh
  discussion:
    types: [created, edited]
  discussion_comment:
    types: [created, edited, deleted]
  schedule:
    - cron: '17 9 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm install rather than npm ci: the lockfile is generated on macOS and
      # npm's platform-specific optional deps (@emnapi/*) break `ci` on linux
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: node scripts/fetch-reports.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
